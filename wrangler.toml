# Project: Afrifacts2.0
name = "afrifacts2-0"
main = "src/server.ts"
compatibility_date = "2026-05-30"
workers_dev = true

# Build configuration using Vite
[build]
command = "npm run build"

# Static assets generated by Vite
[assets]
directory = "./dist"
not_found_handling = "single-page-application"

# Example production route
[[routes]]
pattern = "example.com/*"
zone_name = "example.com"

# Example KV namespace binding
[[kv_namespaces]]
binding = "AFRIFACTS_KV"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
preview_id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# Example R2 bucket binding
[[r2_buckets]]
binding = "AFRIFACTS_BUCKET"
bucket_name = "afrifacts-production"
preview_bucket_name = "afrifacts-development"

# Global environment variables
[vars]
APP_NAME = "Afrifacts2.0"
APP_ENV = "production"
API_BASE_URL = "https://example.com/api"

# Development environment
[env.dev]
name = "afrifacts2-0-dev"
workers_dev = true

# Development route example
[[env.dev.routes]]
pattern = "dev.example.com/*"
zone_name = "example.com"

# Development KV namespace binding
[[env.dev.kv_namespaces]]
binding = "AFRIFACTS_KV"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
preview_id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# Development R2 bucket binding
[[env.dev.r2_buckets]]
binding = "AFRIFACTS_BUCKET"
bucket_name = "afrifacts-development"
preview_bucket_name = "afrifacts-development"

# Development environment variables
[env.dev.vars]
APP_NAME = "Afrifacts2.0"
APP_ENV = "development"
API_BASE_URL = "https://dev.example.com/api"

# Production environment
[env.production]
name = "afrifacts2-0"
workers_dev = true

# Production route example
[[env.production.routes]]
pattern = "example.com/*"
zone_name = "example.com"

# Production KV namespace binding
[[env.production.kv_namespaces]]
binding = "AFRIFACTS_KV"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
preview_id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# Production R2 bucket binding
[[env.production.r2_buckets]]
binding = "AFRIFACTS_BUCKET"
bucket_name = "afrifacts-production"
preview_bucket_name = "afrifacts-development"

# Production environment variables
[env.production.vars]
APP_NAME = "Afrifacts2.0"
APP_ENV = "production"
API_BASE_URL = "https://example.com/api"
